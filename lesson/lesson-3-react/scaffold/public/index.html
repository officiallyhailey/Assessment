<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Animals</title>
<style>
  body { font: 16px/1.6 -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
         background: #f1f8f9; color: #2c4a4d; margin: 0; padding: 40px 20px; }
  .page { max-width: 620px; margin: 0 auto; }
  h1 { color: #005157; font-size: 28px; margin: 0 0 4px; }
  .sub { color: #6b8a8d; font-size: 14px; margin: 0 0 26px; }
  .card { background: #fff; border: 1px solid #dbe7e8; border-radius: 12px; padding: 20px 22px; }
  ul { list-style: none; margin: 0; padding: 0; }
  li { padding: 10px 12px; border: 1px solid #dbe7e8; border-radius: 8px; margin-bottom: 8px; }
  li strong { color: #005157; }
  .tag { font-size: 11px; background: #f1f8f9; color: #6b8a8d; padding: 2px 8px;
         border-radius: 999px; margin-left: 8px; }
  .muted { color: #6b8a8d; font-style: italic; }
</style>
</head>
<body>
<div class="page">
  <h1>Animals</h1>
  <p class="sub">Lesson 3. Step 1 is the endpoint in server.js, then steps 2 to 5 in AnimalList.jsx.</p>
  <div class="card"><div id="root"></div></div>
</div>

<!-- React and Babel from a CDN, so real JSX runs with no build step. Babel
     fetches AnimalList.jsx and compiles it in the browser, which is why the
     component lives in its own file rather than inline here. -->
<script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel" src="AnimalList.jsx"></script>
</body>
</html>
